<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root{
    --green:#1AA662;
    --green-dark:#138a4f;
    --ink:#2b2f33;
    --muted:#7c858c;
  }

  html,body{ background:#e9edf0; }

  /* Card is exactly 9cm x 13cm */
  .card{
    width:9cm;
    height:13cm;
    background:#ffffff;
    position:relative;
    overflow:hidden;
    border-radius:14px;
    box-shadow:0 6px 24px rgba(0,0,0,.12);
    font-family:'Inter',sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  /* lanyard slot at the very top */
  .slot{
    width:1.6cm; height:0.32cm;
    background:#d7dde1;
    border-radius:99px;
    margin-top:0.45cm;
    flex:0 0 auto;
  }

  /* faint watermark leaf shapes in background */
  .wm{ position:absolute; inset:0; z-index:0; pointer-events:none; opacity:.05; }
  .wm svg{ width:100%; height:100%; }

  /* ---- LOGO (top) ---- */
  .logo{
    z-index:2;
    margin-top:.55cm;
    display:flex; flex-direction:column; align-items:center; gap:.14cm;
  }
  .mark{ width:1.75cm; height:1.75cm; }
  .wordmark{
    font-family:'Poppins',sans-serif;
    font-weight:700;
    font-size:25pt;
    letter-spacing:-.5px;
    color:var(--green);
    line-height:1;
  }
  .wordmark .dot{ color:var(--green-dark); }

  /* green divider band */
  .band{
    z-index:2;
    width:100%;
    margin-top:.6cm;
    background:linear-gradient(90deg,var(--green) 0%,var(--green-dark) 100%);
    color:#fff;
    text-align:center;
    padding:.42cm .4cm;
  }
  .band .company{
    font-family:'Poppins',sans-serif;
    font-weight:600;
    font-size:14.5pt;
    letter-spacing:.2px;
    line-height:1.25;
  }
  .band .sub{
    font-size:8.5pt;
    font-weight:500;
    letter-spacing:3px;
    text-transform:uppercase;
    opacity:.9;
    margin-top:.12cm;
  }

  /* personnel area */
  .person{
    z-index:2;
    flex:1 1 auto;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:0 .6cm;
  }
  .photo{
    width:2.5cm; height:2.5cm;
    border-radius:50%;
    background:#f1f4f6;
    border:3px solid var(--green);
    display:flex; align-items:center; justify-content:center;
    margin-bottom:.4cm;
    overflow:hidden;
  }
  .photo svg{ width:62%; height:62%; opacity:.32; }
  .name{
    font-family:'Poppins',sans-serif;
    font-weight:700;
    font-size:21pt;
    color:var(--ink);
    line-height:1.1;
  }
  .title{
    font-size:11pt;
    font-weight:500;
    color:var(--muted);
    margin-top:.18cm;
    letter-spacing:.5px;
  }
  .pid{
    margin-top:.5cm;
    font-size:9pt;
    font-weight:600;
    letter-spacing:1px;
    color:var(--green-dark);
    border:1px solid #d8e6dd;
    background:#f3faf6;
    border-radius:99px;
    padding:.12cm .4cm;
  }

  /* bottom green footer bar */
  .footer{
    z-index:2;
    width:100%;
    background:var(--green);
    height:.62cm;
    display:flex; align-items:center; justify-content:center;
  }
  .footer span{
    color:#fff; font-size:7.5pt; font-weight:600;
    letter-spacing:2px; text-transform:uppercase;
  }
</style>
</head>
<body>
  <div class="card">
    <!-- background watermark -->
    <div class="wm">
      <svg viewBox="0 0 200 290" preserveAspectRatio="xMidYMid slice">
        <circle cx="40" cy="240" r="70" fill="#1AA662"/>
        <circle cx="170" cy="40" r="55" fill="#1AA662"/>
      </svg>
    </div>

    <div class="slot"></div>

    <!-- LOGO -->
    <div class="logo">
      <svg class="mark" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="6" y="6" width="88" height="88" rx="26" fill="#1AA662"/>
        <path d="M34 26 V74 M34 52 L58 28 M40 50 L60 74" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="70" cy="34" r="6" fill="#bdeccd"/>
      </svg>
      <div class="wordmark">kobaküs<span class="dot">.</span></div>
    </div>

    <!-- COMPANY BAND -->
    <div class="band">
      <div class="company">Kobaküs Ödeme<br>Hizmetleri A.Ş.</div>
      <div class="sub">Personel Kimlik Kartı</div>
    </div>

    <!-- PERSONNEL -->
    <div class="person">
      <div class="photo">
        <svg viewBox="0 0 24 24" fill="#1AA662" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10Zm0 2c-5 0-9 2.6-9 6v2h18v-2c0-3.4-4-6-9-6Z"/>
        </svg>
      </div>
      <div class="name">Ad Soyad</div>
      <div class="title">Görev / Departman</div>
      <div class="pid">SİCİL NO · 0000</div>
    </div>

    <!-- FOOTER -->
    <div class="footer"><span>kobakus.com</span></div>
  </div>
</body>
</html>
